<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Trajectory Simulation (D3.js)</title>
    <link rel="stylesheet" href="styles.css" />

    <!-- Підключення D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
  </head>
  <body>
    <h1>Траєкторія руху тіла, кинутого під кутом до горизонту (D3.js)</h1>

    <!-- Форма для введення параметрів -->
    <div id="controls">
      <label>
        Поч. швидкість (м/с):
        <input type="number" id="v0" value="50" step="1" />
      </label>
      <label>
        Кут запуску (°):
        <input type="number" id="angle" value="45" step="1" />
      </label>
      <label>
        Прискорення вільного падіння g (м/с²):
        <input type="number" id="g" value="9.81" step="0.1" />
      </label>
      <button id="updateBtn">Оновити</button>
    </div>

    <!-- SVG для графіка -->
    <svg id="chart" width="800" height="400"></svg>

    <div id="output">
      <p>Час польоту: <span id="flightTime"></span> с</p>
      <p>Дальність: <span id="range"></span> м</p>
      <p>Максимальна висота: <span id="maxHeight"></span> м</p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
